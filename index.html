<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luvu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <h1>Luvu</h1>
    <p class="subtitle">Chat ẩn danh với người lạ</p>

    <div id="status">Bấm bắt đầu để tìm người lạ</div>

    <div id="chatBox" class="chat-box"></div>

    <div class="input-area">
      <input id="messageInput" type="text" placeholder="Nhập tin nhắn..." />
      <button onclick="sendMessage()">Gửi</button>
    </div>

    <div class="buttons">
      <button onclick="startChat()">Bắt đầu</button>
      <button onclick="nextChat()">Next</button>
      <button onclick="stopChat()">Stop</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
